<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — CosTrace</title>
<style>
  body {
    background: #010715;
    color: rgba(255,255,255,0.88);
    font-family: 'Plus Jakarta Sans','Manrope',-apple-system,sans-serif;
    margin: 0;
    padding: 0;
    line-height: 1.7;
  }
  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px 100px;
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 40px;
  }
  .logo a { text-decoration: none; }
  .logo span:first-child { color: white; }
  .logo span:last-child { color: #DC2626; }
  h1 { font-size: 30px; font-weight: 800; color: white; margin-bottom: 8px; }
  .sub { color: rgba(255,255,255,0.5); font-size: 14.5px; margin-bottom: 40px; }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(220,38,38,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .card h2 { font-size: 15px; font-weight: 700; color: white; margin: 0 0 4px; }
  .card p { font-size: 14px; color: rgba(255,255,255,0.6); margin: 0 0 8px; }
  .card a { color: #ff6b6b; text-decoration: none; font-weight: 600; font-size: 14.5px; }
  .card a:hover { text-decoration: underline; }
  .note { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 32px; }
  .back { display: inline-block; margin-top: 40px; color: rgba(255,255,255,0.5); font-size: 13px; text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><a href="/"><span>Cos</span><span>Trace</span></a></div>
  <h1>Contact us</h1>
  <div class="sub">Questions, feedback, or need help with your account? We're glad to hear from you.</div>

  <div class="card">
    <div class="icon">
      <svg width="18" height="18" fill="none" stroke="#ff6b6b" stroke-width="2" viewBox="0 0 24 24">
        <path d="M4 4h16v16H4z" opacity="0"/>
        <path d="M22 6l-10 7L2 6" />
        <rect x="2" y="4" width="20" height="16" rx="2" />
      </svg>
    </div>
    <div>
      <h2>Email</h2>
      <p>For support, billing questions, or anything else — we usually reply within 1-2 business days.</p>
      <a href="mailto:support@costrace.app">support@costrace.app</a>
    </div>
  </div>

  <div class="note">
    See also our <a href="/privacy" style="color:#ff6b6b">Privacy Policy</a> and <a href="/terms" style="color:#ff6b6b">Terms of Service</a>.
  </div>

  <a class="back" href="/">&larr; Back to CosTrace</a>
</div>
</body>
</html>
